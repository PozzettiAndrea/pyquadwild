name: Test

on:
  push:
    branches:
      - main
    paths:
      - "tests/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "tests/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

jobs:
  test:
    name: Test (ubuntu cp312)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install latest wheel from releases
        id: install
        run: |
          gh release download latest --pattern '*cp312*manylinux*x86_64*.whl' --dir wheelhouse 2>/dev/null && \
          pip install wheelhouse/*.whl && echo "installed=true" >> "$GITHUB_OUTPUT" || \
          echo "installed=false" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Skip if no wheel available
        if: steps.install.outputs.installed != 'true'
        run: echo "No release wheel found — skipping tests" && exit 0

      - name: Run tests
        if: steps.install.outputs.installed == 'true'
        run: |
          pip install pytest numpy
          pytest tests/ -v
